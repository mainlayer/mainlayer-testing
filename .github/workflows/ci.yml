name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "mainlayer-other/tier2-integrations/mainlayer-testing/**"
  pull_request:
    branches: [main]
    paths:
      - "mainlayer-other/tier2-integrations/mainlayer-testing/**"

defaults:
  run:
    working-directory: mainlayer-other/tier2-integrations/mainlayer-testing

jobs:
  # --------------------------------------------------------------------------
  # TypeScript
  # --------------------------------------------------------------------------
  typescript:
    name: TypeScript (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: mainlayer-other/tier2-integrations/mainlayer-testing/typescript/package-lock.json

      - name: Install dependencies
        working-directory: mainlayer-other/tier2-integrations/mainlayer-testing/typescript
        run: npm ci

      - name: Type-check
        working-directory: mainlayer-other/tier2-integrations/mainlayer-testing/typescript
        run: npm run typecheck

      - name: Build
        working-directory: mainlayer-other/tier2-integrations/mainlayer-testing/typescript
        run: npm run build

      - name: Test
        working-directory: mainlayer-other/tier2-integrations/mainlayer-testing/typescript
        run: npm test -- --reporter=verbose

  # --------------------------------------------------------------------------
  # Python
  # --------------------------------------------------------------------------
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: mainlayer-other/tier2-integrations/mainlayer-testing/python/pyproject.toml

      - name: Install package and dev dependencies
        working-directory: mainlayer-other/tier2-integrations/mainlayer-testing/python
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        working-directory: mainlayer-other/tier2-integrations/mainlayer-testing/python
        run: ruff check src tests

      - name: Type-check
        working-directory: mainlayer-other/tier2-integrations/mainlayer-testing/python
        run: mypy src/mainlayer_testing

      - name: Test
        working-directory: mainlayer-other/tier2-integrations/mainlayer-testing/python
        run: pytest tests/ -v --tb=short

  # --------------------------------------------------------------------------
  # Publish (on tagged releases)
  # --------------------------------------------------------------------------
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: typescript
    if: startsWith(github.ref, 'refs/tags/v')
    environment: npm-publish

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: mainlayer-other/tier2-integrations/mainlayer-testing/typescript/package-lock.json

      - name: Install and build
        working-directory: mainlayer-other/tier2-integrations/mainlayer-testing/typescript
        run: npm ci && npm run build

      - name: Publish
        working-directory: mainlayer-other/tier2-integrations/mainlayer-testing/typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: python
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi-publish
    permissions:
      id-token: write  # required for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build distribution
        working-directory: mainlayer-other/tier2-integrations/mainlayer-testing/python
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mainlayer-other/tier2-integrations/mainlayer-testing/python/dist/
